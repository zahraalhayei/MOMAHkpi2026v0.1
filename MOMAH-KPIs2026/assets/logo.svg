<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" font-family="Tajawal, Arial, sans-serif">
  <!-- City skyline + palm icon (stylized) -->
  <g transform="translate(10,10)">
    <!-- Palm fronds -->
    <g fill="#7AB648">
      <ellipse cx="55" cy="18" rx="22" ry="6" transform="rotate(-15 55 18)"/>
      <ellipse cx="55" cy="18" rx="22" ry="6" transform="rotate(15 55 18)"/>
      <ellipse cx="55" cy="18" rx="22" ry="6" transform="rotate(-45 55 18)"/>
      <ellipse cx="55" cy="18" rx="22" ry="6" transform="rotate(45 55 18)"/>
      <ellipse cx="55" cy="18" rx="22" ry="6" transform="rotate(-75 55 18)"/>
      <ellipse cx="55" cy="18" rx="22" ry="6" transform="rotate(75 55 18)"/>
    </g>
    <!-- Trunk -->
    <rect x="53" y="22" width="4" height="20" fill="#5a7d2a"/>
    <!-- City buildings -->
    <g fill="#7AB648">
      <rect x="20" y="45" width="14" height="40"/>
      <rect x="36" y="35" width="18" height="50"/>
      <rect x="56" y="42" width="14" height="43"/>
      <rect x="72" y="30" width="16" height="55"/>
      <rect x="90" y="48" width="12" height="37"/>
    </g>
    <!-- Window dots -->
    <g fill="#fff">
      <circle cx="27" cy="55" r="1.5"/><circle cx="27" cy="65" r="1.5"/><circle cx="27" cy="75" r="1.5"/>
      <circle cx="45" cy="48" r="1.5"/><circle cx="45" cy="58" r="1.5"/><circle cx="45" cy="68" r="1.5"/><circle cx="45" cy="78" r="1.5"/>
      <circle cx="63" cy="55" r="1.5"/><circle cx="63" cy="65" r="1.5"/><circle cx="63" cy="75" r="1.5"/>
      <circle cx="80" cy="42" r="1.5"/><circle cx="80" cy="55" r="1.5"/><circle cx="80" cy="68" r="1.5"/><circle cx="80" cy="78" r="1.5"/>
      <circle cx="96" cy="60" r="1.5"/><circle cx="96" cy="72" r="1.5"/>
    </g>
  </g>
  <!-- Arabic name -->
  <text x="370" y="45" text-anchor="end" font-size="26" font-weight="700" fill="#1B75BB">وزارة البلديات والإسكان</text>
  <!-- English name -->
  <text x="370" y="75" text-anchor="end" font-size="14" font-weight="600" fill="#7AB648">Ministry of Municipalities and Housing</text>
</svg>
